name: Release

# Builds release artifacts (npm pack tarball + runnable demo zip) and attaches
# them to a GitHub release. Never runs on push: only on manual dispatch with an
# existing tag, or when the operator publishes a release. Tagging, releasing,
# and any npm publish stay operator-gated.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach artifacts to (e.g. v0.2.0)"
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check out Telos
        uses: actions/checkout@v7
        with:
          path: telos

      - name: Check out Gather
        uses: actions/checkout@v7
        with:
          repository: HarperZ9/gather
          path: gather

      - name: Check out Crucible
        uses: actions/checkout@v7
        with:
          repository: HarperZ9/crucible
          path: crucible

      - name: Check out Index
        uses: actions/checkout@v7
        with:
          repository: HarperZ9/index
          path: index

      - name: Check out Forum
        uses: actions/checkout@v7
        with:
          repository: HarperZ9/forum
          path: forum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run Telos contract tests
        working-directory: telos
        run: |
          node demo/action-receipt.test.mjs
          node demo/admission-telemetry.test.mjs
          node demo/atp-adapter-validation.test.mjs
          node demo/brand-renderer.test.mjs
          node demo/ci-doctor.test.mjs
          node demo/ci-triage.test.mjs
          node demo/context-envelope.test.mjs
          node demo/creative-engine.test.mjs
          node demo/effects-protocol.test.mjs
          node demo/effects-engine.test.mjs
          node demo/flagship-action.test.mjs
          node demo/index-html.test.mjs
          node demo/integrations.test.mjs
          node demo/loop-ledger.test.mjs
          node demo/measurement-layers.test.mjs
          node demo/mcp-freshness.test.mjs
          node demo/mcp-runtime-contract.test.mjs
          node demo/native-control.test.mjs
          node demo/operator-source-leads.test.mjs
          node demo/operator-scripts.test.mjs
          node demo/accessibility-doctor.test.mjs
          node demo/performance-doctor.test.mjs
          node demo/compatibility-doctor.test.mjs
          node demo/operator-doctor.test.mjs
          node demo/presentation-doctor.test.mjs
          node demo/project-current-state-docs.test.mjs
          node demo/rendering-capabilities.test.mjs
          node demo/rendering-research.test.mjs
          node demo/research-seed.test.mjs
          node demo/second-level-flagship-queue.test.mjs
          node demo/server-manifest.test.mjs
          node demo/showcase.test.mjs
          node demo/telos-mcp.test.mjs
          node demo/workstation-substrate.test.mjs
          node demo/youtube-research-receipts.test.mjs

      - name: Run MCP launch gate
        working-directory: telos
        run: npm run test:mcp

      - name: Run Telos room and workflow smoke
        working-directory: telos
        run: |
          node demo/catalog.mjs --summary
          node demo/server-manifest.mjs --summary
          node demo/room.mjs --json
          node demo/flagship-workflow.mjs

  release:
    name: build and attach artifacts
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build npm pack tarball
        run: |
          npm pack
          ls -l ./*.tgz

      - name: Build runnable demo zip
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          zip -r "project-telos-demo-$TAG.zip" \
            demo README.md LICENSE CHANGELOG.md USAGE.md Dockerfile \
            docs/CURRENT-STATE.md docs/brand
          ls -l "project-telos-demo-$TAG.zip"

      - name: Attach artifacts to the GitHub release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release upload "$TAG" ./*.tgz "project-telos-demo-$TAG.zip" --clobber

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            *.tgz
            project-telos-demo-*.zip
