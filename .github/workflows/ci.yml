name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out Telos
        uses: actions/checkout@v4
        with:
          path: telos

      - name: Check out Gather
        uses: actions/checkout@v4
        with:
          repository: HarperZ9/gather
          path: gather

      - name: Check out Crucible
        uses: actions/checkout@v4
        with:
          repository: HarperZ9/crucible
          path: crucible

      - name: Check out Index
        uses: actions/checkout@v4
        with:
          repository: HarperZ9/index
          path: index

      - name: Check out Forum
        uses: actions/checkout@v4
        with:
          repository: HarperZ9/forum
          path: forum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Telos contract tests
        working-directory: telos
        run: |
          node demo/action-receipt.test.mjs
          node demo/admission-telemetry.test.mjs
          node demo/context-envelope.test.mjs
          node demo/flagship-action.test.mjs
          node demo/index-html.test.mjs
          node demo/integrations.test.mjs
          node demo/loop-ledger.test.mjs
          node demo/mcp-runtime-contract.test.mjs
          node demo/operator-scripts.test.mjs
          node demo/server-manifest.test.mjs
          node demo/telos-mcp.test.mjs
          node demo/youtube-research-receipts.test.mjs

      - name: Run Telos room and workflow smoke
        working-directory: telos
        run: |
          node demo/catalog.mjs --summary
          node demo/server-manifest.mjs --summary
          node demo/room.mjs --json
          node demo/flagship-workflow.mjs
